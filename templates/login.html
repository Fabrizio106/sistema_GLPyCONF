{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CEDITEV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>
    <div class="login-wrapper">

        <div class="login-left">
            <img src="{% static 'img/login-illustration.svg' %}" alt="Ilustración de login">
        </div>

        <div class="login-right">
            <div class="login-box">

                <h2 class="login-title">Inicia sesión en</h2>

                <img src="{% static 'img/logo-ceditev.png' %}" alt="CEDITEV" class="logo">

                <p class="subtitle">Sistema de Certificaciones GLP y CMD</p>

                <form method="POST">
                    {% csrf_token %}

                    <label class="form-label">Usuario</label>
                    <div class="input-group">
                        <input 
                            type="text" 
                            name="username" 
                            class="form-control" 
                            placeholder="Ingresa tu usuario" 
                            required
                        >
                        <span class="input-group-text">
                            <i class="bi bi-person"></i>
                        </span>
                    </div>

                    <label class="form-label">Contraseña</label>
                    <div class="input-group">
                        <input 
                            type="password" 
                            name="password" 
                            class="form-control" 
                            placeholder="Ingresa tu contraseña" 
                            required
                        >
                        <span class="input-group-text">
                            <i class="bi bi-lock"></i>
                        </span>
                    </div>

                    <button type="submit" class="btn btn-login">
                        Iniciar Sesión
                    </button>

                    {% if form.errors %}
                        <div class="alert alert-danger py-2 text-center">
                            Usuario o contraseña incorrectos.
                        </div>
                    {% endif %}
                </form>

            </div>
        </div>

    </div>
</body>
</html>
