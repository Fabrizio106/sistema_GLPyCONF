<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema de Certificaciones{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; overflow-x: hidden; }
        .sidebar { min-height: 100vh; background-color: #1a2035; color: white; }
        .sidebar-brand { padding: 1.5rem; font-weight: 800; font-size: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-brand span { color: #8a98bc; font-size: 0.8rem; display: block; font-weight: 400; }
        .nav-link { color: #a1aabf; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 10px; }
        .nav-link:hover, .nav-link.active { color: white; background-color: rgba(255,255,255,0.05); border-left: 4px solid #0d6efd; }
        .topbar { background-color: white; border-bottom: 1px solid #e5e7eb; padding: 1rem 2rem; }
        .card { border: none; border-radius: 10px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); margin-bottom: 1.5rem; }
        .card-title { color: #1a2035; font-weight: 700; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
        .form-label { font-size: 0.75rem; font-weight: 700; color: #6b7280; text-transform: uppercase; }
        .btn-success-custom { background-color: #057a55; border: none; font-weight: 600; padding: 12px; }
        .btn-success-custom:hover { background-color: #046c4e; }
    </style>
</head>
<body>

<div class="d-flex">
    <div class="sidebar col-auto col-md-3 col-xl-2 px-sm-2 px-0 text-white">
        <div class="sidebar-brand">
            CERTIFICATION<br>ADMIN
            <span>Technical Curator</span>
        </div>
        <ul class="nav flex-column mb-sm-auto mb-0 align-items-center align-items-sm-start mt-3" id="menu">
            <li class="nav-item w-100">
                <a href="#" class="nav-link active">
                    <i class="bi bi-file-earmark-text"></i> Módulo GLP
                </a>
            </li>
            <li class="nav-item w-100">
                <a href="#" class="nav-link">
                    <i class="bi bi-gear"></i> Módulo Conformidades
                </a>
            </li>
        </ul>
    </div>

    <div class="col d-flex flex-column h-sm-100">
        <div class="topbar d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-3">
                <span class="fw-bold">Módulo GLP</span>
                <span class="text-muted small border-start border-2 ps-3">Vehicle Certification System</span>
            </div>
            <div class="d-flex gap-3 text-muted fs-5">
                <i class="bi bi-bell"></i>
                <i class="bi bi-box-arrow-right"></i>
            </div>
        </div>

        <div class="p-4" style="max-height: calc(100vh - 70px); overflow-y: auto;">
            {% block content %}
            {% endblock %}
        </div>
    </div>
</div>

{% block scripts %}{% endblock %}
</body>
</html>
